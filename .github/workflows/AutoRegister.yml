name: AutoRegister

# Triggered on push to main. If Project.toml version changed, post a
# @JuliaRegistrator register comment to kick off the registration pipeline.

on:
  push:
    branches:
      - main
    paths:
      - Project.toml

permissions:
  contents: write
  issues: write

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # need HEAD and HEAD~1 to compare

      - name: Check if version changed
        id: version_check
        run: |
          PREV=$(git show HEAD~1:Project.toml 2>/dev/null | grep '^version' | head -1 | sed 's/.*"\(.*\)"/\1/' || echo "")
          CURR=$(grep '^version' Project.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "prev=$PREV"
          echo "curr=$CURR"
          echo "prev=$PREV" >> "$GITHUB_OUTPUT"
          echo "curr=$CURR" >> "$GITHUB_OUTPUT"
          if [ "$PREV" != "$CURR" ] && [ -n "$CURR" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes text
        if: steps.version_check.outputs.changed == 'true'
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURR="${{ steps.version_check.outputs.curr }}"

          DRAFT_TAG="v$CURR"
          DRAFT_BODY=$(gh release view "$DRAFT_TAG" --json body --jq '.body' 2>/dev/null || echo "")

          if [ -z "$DRAFT_BODY" ] || [ "$DRAFT_BODY" = "null" ]; then
            DRAFT_BODY=$(gh release list --limit 50 --json tagName,isDraft \
              --jq '.[] | select(.isDraft == true) | .tagName' | head -n 1 | xargs -I{} gh release view {} --json body --jq '.body' 2>/dev/null || echo "")
          fi

          if [ -z "$DRAFT_BODY" ] || [ "$DRAFT_BODY" = "null" ]; then
            DRAFT_BODY="## Changelog\n\n- See changelog/commit history for details in v$CURR.\n\n## Breaking changes\n\n- No explicit breaking changes were detected in automation."
          fi

          printf 'content<<EOF\n%s\nEOF\n' "$DRAFT_BODY" >> "$GITHUB_OUTPUT"

      - name: Post @JuliaRegistrator comment on commit
        if: steps.version_check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURR="${{ steps.version_check.outputs.curr }}"
          PREV="${{ steps.version_check.outputs.prev }}"
          COMMIT="${{ github.sha }}"
          RELEASE_NOTES="${{ steps.notes.outputs.content }}"

          BODY="@JuliaRegistrator register

          Release notes:

          $RELEASE_NOTES

          Version bumped from \`$PREV\` -> \`$CURR\` by commit $COMMIT."

          # Registrator accepts comments on commits or issues, but not pull requests.
          gh api repos/${{ github.repository }}/commits/$COMMIT/comments \
            -f body="$BODY"
